<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sumo Beach Volley</title>
<!-- PWA / installeerbare app -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a4a78">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sumo Volley">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    width:100%;height:100%;overflow:hidden;
    touch-action:none;user-select:none;-webkit-user-select:none;
    background:#0a4a78;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  #app{position:relative;width:100%;height:100%;}
  #cwrap{position:absolute;inset:0;overflow:hidden;}
  canvas{position:absolute;display:block;image-rendering:auto;}
  #scorebar{
    position:absolute;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:max(env(safe-area-inset-top),12px) 18px 8px;
    pointer-events:none;z-index:5;
  }
  .score{
    background:rgba(0,0,0,.45);
    color:#fff;
    padding:6px 14px;
    border-radius:14px;
    font-weight:700;
    font-size:1.05rem;
    letter-spacing:.5px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border:1.5px solid rgba(255,255,255,.25);
  }
  .score.p1{color:#ffe48a;}
  .score.p2{color:#ffb0b0;}

  /* Menu overlay */
  #menu{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg, rgba(10,30,60,.85), rgba(10,30,60,.92));
    z-index:10;
    color:#fff;
    text-align:center;
    padding:20px;
    opacity:0;pointer-events:none;transition:opacity .35s ease;
  }
  #menu.show{opacity:1;pointer-events:auto;}
  #menu h1{
    font-size:2.1rem;font-weight:900;
    margin-bottom:8px;
    text-shadow:0 3px 0 rgba(0,0,0,.35);
    letter-spacing:1px;
  }
  #menu .sub{
    font-size:1.05rem;opacity:.85;margin-bottom:24px;
  }
  #menu .winner{
    font-size:2.4rem;font-weight:900;margin-bottom:6px;
    color:#ffd84d;
    text-shadow:0 3px 0 rgba(0,0,0,.4);
  }
  #menu .final{
    font-size:1.1rem;opacity:.9;margin-bottom:28px;
    color:#fff;
  }
  #playBtn{
    background:linear-gradient(180deg, #ffd84d, #ff9d2e);
    color:#5a2a00;
    border:none;
    padding:16px 42px;
    font-size:1.25rem;font-weight:900;
    border-radius:18px;
    cursor:pointer;
    box-shadow:0 5px 0 #b35a00, 0 8px 18px rgba(0,0,0,.35);
    letter-spacing:1px;
    text-transform:uppercase;
    transition:transform .08s, box-shadow .08s;
  }
  #playBtn:active{
    transform:translateY(3px);
    box-shadow:0 2px 0 #b35a00, 0 4px 10px rgba(0,0,0,.35);
  }
  #howto{
    margin-top:22px;
    font-size:.85rem;opacity:.75;line-height:1.5;
    max-width:280px;
  }
  #howto b{color:#ffd84d;}
  /* Keuzescherm */
  #keuzescherm{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,rgba(10,30,60,.92),rgba(10,30,60,.98));
    z-index:20;color:#fff;text-align:center;padding:20px;
    opacity:0;pointer-events:none;transition:opacity .35s ease;
  }
  #keuzescherm.show{opacity:1;pointer-events:auto;}
  #keuzescherm h2{font-size:1.6rem;font-weight:900;margin-bottom:6px;letter-spacing:1px;text-shadow:0 2px 0 rgba(0,0,0,.4);}
  #keuzescherm .sub{font-size:.9rem;opacity:.8;margin-bottom:18px;}
  #keuze-carousel-wrap{
    width:min(300px,75vw);
    overflow:hidden;
    margin-bottom:16px;
  }
  #keuze-carousel{
    display:flex;
    transition:transform .35s cubic-bezier(.25,.46,.45,.94);
    cursor:grab;
    user-select:none;-webkit-user-select:none;
  }
  #keuze-carousel:active{cursor:grabbing;}
  .keuze-kaart{
    min-width:100%;
    border-radius:14px;
    overflow:hidden;
  }
  .keuze-kaart img{width:100%;display:block;pointer-events:none;}
  #keuze-dots{
    display:flex;gap:8px;margin-bottom:20px;
  }
  .keuze-dot{
    width:10px;height:10px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    transition:background .2s;
  }
  .keuze-dot.actief{background:#ffd84d;}
  #kiesBtn{
    background:linear-gradient(180deg,#ffd84d,#ff9d2e);
    color:#5a2a00;border:none;
    padding:14px 40px;
    font-size:1.15rem;font-weight:900;
    border-radius:16px;cursor:pointer;
    box-shadow:0 4px 0 #b35a00,0 6px 14px rgba(0,0,0,.35);
    letter-spacing:1px;text-transform:uppercase;
    transition:transform .08s,box-shadow .08s;
  }
  #kiesBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #b35a00;}
</style>
</head>
<body>
<div id="app">
  <div id="scorebar">
    <span class="score p1" id="sc1">JIJ 0</span>
    <span class="score p2" id="sc2">CPU 0</span>
  </div>
  <div id="cwrap">
    <canvas id="gc"></canvas>
  </div>

  <div id="keuzescherm">
    <h2>KIES JE SUMO</h2>
    <div class="sub">Veeg links of rechts om te kiezen</div>
    <div id="keuze-carousel-wrap">
      <div id="keuze-carousel">
        <div class="keuze-kaart" data-char="rood"><img src="assets/images/sumo_rood_kaart.png" alt="Vuurbal Sumo"></div>
        <div class="keuze-kaart" data-char="geel"><img src="assets/images/sumo_geel_kaart.png" alt="Bliksem Sumo"></div>
        <div class="keuze-kaart" data-char="turquoise"><img src="assets/images/sumo_turquoise_kaart.png" alt="Zeewind Sumo"></div>
        <div class="keuze-kaart" data-char="paars"><img src="assets/images/sumo_paars_kaart.png" alt="Schaduw Sumo"></div>
      </div>
    </div>
    <div id="keuze-dots">
      <span class="keuze-dot actief"></span>
      <span class="keuze-dot"></span>
      <span class="keuze-dot"></span>
      <span class="keuze-dot"></span>
    </div>
    <button id="kiesBtn">Kiezen</button>
  </div>
  <div id="menu">
    <div id="menuContent"></div>
    <button id="playBtn">Spelen</button>
    <div id="howto">
      <b>Tik links</b> om naar links te lopen<br>
      <b>Tik rechts</b> om naar rechts te lopen<br>
      <b>Tik boven</b> om te springen<br>
      Eerste bij <b>10 punten</b> wint
    </div>
  </div>
</div>

// ════════════════════════════════════════════
//  VIRTUELE SPELWERELD — portrait 450x900
// ════════════════════════════════════════════
const VW=450, VH=900;
let SCALE=1, CW=VW, CH=VH;

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

function resize(){
  const wrap=document.getElementById('cwrap');
  const rw=wrap.clientWidth||window.innerWidth;
  const rh=wrap.clientHeight||window.innerHeight;
  // Interne tekenresolutie: hele wereld scherp in beeld (uniform geschaald)
  SCALE=Math.min(rw/VW, rh/VH);
  CW=Math.round(VW*SCALE);
  CH=Math.round(VH*SCALE);
  canvas.width=CW;
  canvas.height=CH;
  // Via CSS het hele scherm vullen (geen blauwe balken meer);
  // licht verticaal uitrekken i.p.v. afsnijden, zodat niets van het spel wegvalt.
  canvas.style.width=rw+'px';
  canvas.style.height=rh+'px';
  canvas.style.left='0px';
  canvas.style.top='0px';
}
resize();
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,150));
setTimeout(resize,300);

const bgImg = new Image();

bgImg.onload = ()=>{ bgReady = true; };

const sumoImgs = { p1: new Image(), p2: new Image() };
const sumoCanvases = { p1: null, p2: null };
const sumosReady = { p1: false, p2: false };

function removeWhiteBg(img) {
  const oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  const oc2d = oc.getContext('2d');
  oc2d.drawImage(img, 0, 0);
  const d = oc2d.getImageData(0, 0, oc.width, oc.height);
  for (let i = 0; i < d.data.length; i += 4) {
    if (d.data[i] > 220 && d.data[i+1] > 220 && d.data[i+2] > 220)
      d.data[i+3] = 0;
  }
  oc2d.putImageData(d, 0, 0);
  return oc;
}

sumoImgs.p1.onload = () => {
  try { sumoCanvases.p1 = removeWhiteBg(sumoImgs.p1); }
  catch(e) { const c=document.createElement('canvas'); c.width=sumoImgs.p1.width; c.height=sumoImgs.p1.height; c.getContext('2d').drawImage(sumoImgs.p1,0,0); sumoCanvases.p1=c; }
  sumosReady.p1 = true;
};
sumoImgs.p2.onload = () => {
  try { sumoCanvases.p2 = removeWhiteBg(sumoImgs.p2); }
  catch(e) { const c=document.createElement('canvas'); c.width=sumoImgs.p2.width; c.height=sumoImgs.p2.height; c.getContext('2d').drawImage(sumoImgs.p2,0,0); sumoCanvases.p2=c; }
  sumosReady.p2 = true;
};

function loadSumos(p1Char){
  const all=['rood','geel','paars','turquoise'];
  const others=all.filter(c=>c!==p1Char);
  const p2Char=others[Math.floor(Math.random()*others.length)];
  sumosReady.p1=false; sumosReady.p2=false;
  sumoImgs.p1.src=sumoSrcMap[p1Char];
  sumoImgs.p2.src=sumoSrcMap[p2Char];
  chosenChars.p1 = p1Char;

// ════════════════════════════════════════════
//  CONSTANTS — wereld layout (portrait!)
// ════════════════════════════════════════════
// Sumo's lopen over de witte lijn in de zandvlakte.
// In de bron-afbeelding (450x900) zit de witte lijn rond y=635
// en de paal staat van ~y=635 tot ~y=480.
const GND   = ()=> 665;          // grondniveau (witte lijn y in wereld coords)
const NET_X = ()=> VW/2;          // net midden
const NET_W = ()=> 10;            // halve breedte van de paal
const NET_TOP=()=> 500;           // top van de paal (in wereld coords)
const NET_H = ()=> GND()-NET_TOP();

// Physics
const G_PLR=0.55, G_BALL=0.16;
const PR    =()=> 33;             // sumo radius
const BR    =()=> 16;             // bal radius
const SPD   =()=> 5.5;            // grondsnelheid sumo
const AIR_CTRL=()=> 0.65;
const MAX_JUMP=()=> 230;          // sprong hoogte (px)
const JF_GND=()=> -Math.sqrt(2*G_PLR*MAX_JUMP());
const WIN_POINTS=10;

// Karakter stats — multipliers per sumo
const charStats = {
  rood:      { speed: 0.88, jump: 1.00, attack: 1.30, defense: 0.92 },  // Vuurbal: hardste slag, traag
  geel:      { speed: 1.15, jump: 1.25, attack: 1.00, defense: 1.00 },  // Bliksem: snel & hoog
  turquoise: { speed: 1.05, jump: 0.92, attack: 1.10, defense: 1.05 },  // Zeewind: balanced aanvallend
  paars:     { speed: 1.20, jump: 1.00, attack: 0.85, defense: 1.18 },  // Schaduw: snel & defensief
};
const chosenChars = { p1: 'turquoise', p2: 'rood' };

// Net-veer
const netSpringJF=(b)=>{
  const cap=2*NET_H()-PR();
  const h=MAX_JUMP()*Math.pow(1.06,b);
  return -Math.sqrt(2*G_PLR*Math.min(h,cap));
};
const netSpringVX=(b,goLeft)=>{
  const v=Math.min(SPD()*2.0*Math.pow(1.08,b), SPD()*5.0);
  return goLeft?-v:v;
};

// ════════════════════════════════════════════
//  INPUT — touch + keyboard
// ════════════════════════════════════════════
const held1={l:false,r:false,j:false};

// Besturing: links/rechts = vasthouden op linker/rechter schermhelft.
//            springen = omhoog swipen, waar dan ook op het scherm.
const SWIPE_DIST = 0.06;   // min. verticale afstand (fractie schermhoogte)
const SWIPE_TIME = 350;    // max. duur van de swipe (ms)
const touchData = {};      // per vinger: startpositie, tijd, of er al gesprongen is
let jumpUntil = 0;         // springen blijft kort "ingedrukt" na een swipe

function updateLR(touches, rect){
  // Links/rechts bepalen door waar de vingers nu zijn
  held1.l=false; held1.r=false;
  Array.from(touches).forEach(t=>{
    const x=t.clientX-rect.left;
    if(x < rect.width*0.50) held1.l=true; else held1.r=true;
  });
}
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  Array.from(e.changedTouches).forEach(t=>{
    touchData[t.identifier]={ x:t.clientX, y:t.clientY, t:performance.now(), jumped:false };
  });
  updateLR(e.touches, rect);
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const now=performance.now();
  Array.from(e.changedTouches).forEach(t=>{
    const d=touchData[t.identifier];
    if(!d || d.jumped) return;
    const up = d.y - t.clientY;                 // positief = omhoog geveegd
    if(up > rect.height*SWIPE_DIST && (now-d.t) < SWIPE_TIME){
      jumpUntil = now + 120;                     // spring-puls
      d.jumped = true;                           // niet nog eens met dezelfde veeg
    }
  });
  updateLR(e.touches, rect);
}, {passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{ delete touchData[t.identifier]; });
  updateLR(e.touches, canvas.getBoundingClientRect());
}, {passive:false});
canvas.addEventListener('touchcancel', e=>{
  Array.from(e.changedTouches||[]).forEach(t=>{ delete touchData[t.identifier]; });
  held1.l=false; held1.r=false;
}, {passive:false});

// Voor desktop testen
const K={};
document.addEventListener('keydown', e=>{ K[e.key]=true; });
document.addEventListener('keyup',   e=>{ K[e.key]=false; });
const p1L=()=> held1.l || K['a'] || K['A'] || K['ArrowLeft'];
const p1R=()=> held1.r || K['d'] || K['D'] || K['ArrowRight'];
const p1J=()=> performance.now() < jumpUntil || K['w'] || K['W'] || K['ArrowUp'] || K[' '];

// Muis voor desktop test: links/rechts vasthouden, omhoog slepen = springen
let mouseDown=false, mouseStartY=0, mouseStartT=0, mouseJumped=false;
canvas.addEventListener('mousedown', e=>{
  mouseDown=true; mouseStartY=e.clientY; mouseStartT=performance.now(); mouseJumped=false;
  const rect=canvas.getBoundingClientRect();
  held1.l=false; held1.r=false;
  if(e.clientX-rect.left < rect.width*0.50) held1.l=true; else held1.r=true;
});
canvas.addEventListener('mousemove', e=>{
  if(!mouseDown) return;
  const rect=canvas.getBoundingClientRect();
  held1.l=false; held1.r=false;
  if(e.clientX-rect.left < rect.width*0.50) held1.l=true; else held1.r=true;
  if(!mouseJumped && (mouseStartY-e.clientY) > rect.height*SWIPE_DIST && (performance.now()-mouseStartT) < SWIPE_TIME){
    jumpUntil=performance.now()+120; mouseJumped=true;
  }
});
canvas.addEventListener('mouseup', ()=>{
  mouseDown=false; held1.l=false; held1.r=false;
});
canvas.addEventListener('mouseleave', ()=>{
  mouseDown=false; held1.l=false; held1.r=false;
});

//  STATE
// ════════════════════════════════════════════
let score=[0,0], over=false, srv=0;
let p1, p2, ball;
let dead=false, deadT=0;
let jLock1=false, jLock2=false;
const p1NB={v:0}, p2NB={v:0};
let running=false;
let serveMode=false;

// ════════════════════════════════════════════
//  ENTITIES
// ════════════════════════════════════════════
function mkPlayer(side){
  // side 0 = links (speler), side 1 = rechts (CPU)
  const charId = side===0 ? chosenChars.p1 : chosenChars.p2;
  return {
    x: side===0 ? VW*0.27 : VW*0.73,
    y: GND()-PR(),
    vx:0, vy:0,
    grounded:true, onNet:false,
    side,
    facing: side===0 ? 1 : -1,
    bobT: Math.random()*Math.PI*2,
    stats: charStats[charId] || charStats.turquoise
  };
}
function mkBall(sv){
  serveMode=true;
  const sx = sv===0 ? VW*0.27 : VW*0.73;
  return { x:sx, y: GND()-300, vx:0, vy:0, spin:0 };
}
function resetPositions(){
  p1.x=VW*0.27; p1.y=GND()-PR(); p1.vx=0; p1.vy=0; p1.grounded=true; p1.onNet=false;
  p2.x=VW*0.73; p2.y=GND()-PR(); p2.vx=0; p2.vy=0; p2.grounded=true; p2.onNet=false;
  p1NB.v=0; p2NB.v=0;
}
function init(){
  p1=mkPlayer(0); p2=mkPlayer(1);
  ball=mkBall(srv);
  dead=false; deadT=0; over=false;
  jLock1=false; jLock2=false;
  p1NB.v=0; p2NB.v=0;
  score=[0,0];
  updateScore();
}
function updateScore(){
  document.getElementById('sc1').textContent='JIJ '+score[0];
  document.getElementById('sc2').textContent='CPU '+score[1];
}

//  CPU AI — bijna perfect, mist op extreme hoeken
// ════════════════════════════════════════════
const cpuIn={l:false, r:false, j:false};
let cpuReaction=0;     // frames vertraging om te 'denken'
let cpuJumpCooldown=0;
let cpuMistakeT=0;     // korte momenten van foutjes
let cpuMistakeDir=0;   // vaste richting tijdens een mistake

function predictBallLanding(){
  // Simuleer bal in CPU's helft tot bal de speler-hoogte bereikt
  let bx=ball.x, by=ball.y, bvx=ball.vx, bvy=ball.vy;
  const targetY = GND() - PR();
  let t = 0;
  while(by < targetY && t < 240){
    bvy += G_BALL;
    bvx *= 0.999;
    bx += bvx; by += bvy;
    // Net bounce simulatie (simpel)
    if(by + BR() > NET_TOP() && bx > NET_X()-NET_W()-BR() && bx < NET_X()+NET_W()+BR()){
      if(bvx<0 && bx >= NET_X()){ bx = NET_X()+NET_W()+BR(); bvx=Math.abs(bvx)*.6; bvy*=.55; }
      else if(bvx>0 && bx <= NET_X()){ bx = NET_X()-NET_W()-BR(); bvx=-Math.abs(bvx)*.6; bvy*=.55; }
    }
    // Wand bounce
    if(bx-BR()<0){ bx=BR(); bvx=Math.abs(bvx)*.7; }
    if(bx+BR()>VW){ bx=VW-BR(); bvx=-Math.abs(bvx)*.7; }
    t++;
  }
  return {x:bx, y:by, t};
}

function updateCPU(){
  cpuIn.l=false; cpuIn.r=false; cpuIn.j=false;
  if(dead || over){ return; }

  if(cpuJumpCooldown>0) cpuJumpCooldown--;
  if(cpuMistakeT>0) cpuMistakeT--;

  // Service modus: CPU staat klaar, springt + slaat als het zijn beurt is
  if(serveMode && srv===1){
    const target = VW*0.73;
    if(p2.x < target-3) cpuIn.r=true;
    else if(p2.x > target+3) cpuIn.l=true;
    if(ball.y > GND()-220 && p2.grounded && cpuJumpCooldown<=0){
      cpuIn.j=true;
      cpuJumpCooldown=20;
    }
    return;
  }

  // Voorspel waar de bal naartoe gaat
  const pred = predictBallLanding();
  const ballComing = ball.vx > 0.3 || (ball.x > NET_X() && ball.vx > -0.5);

  let targetX;
  if(ballComing){
    targetX = pred.x;
    if(targetX < NET_X()+PR()+10) targetX = NET_X()+PR()+10;
    if(targetX > VW-PR()) targetX = VW-PR();
  } else {
    // Defensieve positie — dichter bij midden zodat hij snel kan reageren
    targetX = VW*0.68;
  }

  // Foutmarge alleen op echt extreme hoeken (zeer zeldzaam)
  const ballSpeed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
  const isExtreme = (pred.x > VW*0.94 || pred.x < NET_X()+PR()+10) && ballSpeed > 7.5;
  if(isExtreme && Math.random()<0.004 && cpuMistakeT===0){
    cpuMistakeT = 10 + Math.floor(Math.random()*12);
    cpuMistakeDir = Math.random()<0.5 ? -1 : 1;
  }
  if(cpuMistakeT>0){
    targetX = p2.x + cpuMistakeDir*25;
  }

  // Beweeg richting target — deadzone groter dan stap per frame om oscillatie te voorkomen
  const dx = targetX - p2.x;
  const deadzone = SPD()*(p2.stats?.speed||1) + 2;
  if(dx < -deadzone) cpuIn.l=true;
  else if(dx > deadzone) cpuIn.r=true;

  // Spring beslissing — agressiever
  const dxBall = ball.x - p2.x;
  const dyBall = ball.y - p2.y;
  const horizClose = Math.abs(dxBall) < PR()*2.2;
  const ballAbove = dyBall < -PR()*0.3 && dyBall > -300;

  // Smash kans: bal hoog en bijna boven CPU
  if(p2.grounded && cpuJumpCooldown<=0 && horizClose && ballAbove && cpuMistakeT===0){
    // Tijd-check: zou de bal binnen kort bereik komen?
    const timeUntilHittable = (p2.y - PR()*1.2 - ball.y) / Math.max(ball.vy, 0.5);
    if(ball.vy >= -1 || (timeUntilHittable > 0 && timeUntilHittable < 40)){
      cpuIn.j=true;
      cpuJumpCooldown=18;
    }
  }
  // Proactieve smash: bal komt hoog over het net, spring vroeg om hard te slaan
  if(p2.grounded && cpuJumpCooldown<=0 && cpuMistakeT===0
     && ball.x > NET_X() && ball.y < GND()-200
     && Math.abs(pred.x - p2.x) < 50 && ball.vy >= -0.5){
    cpuIn.j=true;
    cpuJumpCooldown=20;
  }
}

const cpuL=()=>cpuIn.l;
const cpuR=()=>cpuIn.r;
const cpuJ=()=>cpuIn.j;

// ════════════════════════════════════════════
//  PHYSICS
// ════════════════════════════════════════════
function playerNet(p, nb){
  const GY=GND(), NX=NET_X(), NH=NET_H(), R=PR(), netTop=NET_TOP();
  // Op de paal landen — pak het moment dat hij het netTop deze frame oversteekt
  const prevYbottom = (p.y - p.vy) + R;
  if(Math.abs(p.x-NX)<R*0.9 && p.vy>=0 && prevYbottom <= netTop+1 && p.y+R >= netTop){
    p.y = netTop - R;
    const cb = nb.v;
    p.vy = netSpringJF(cb);
    p.vx = 0;   // recht omhoog; sturen kan nog via links/rechts tikken in de lucht
    p.grounded=false;
    nb.v = Math.min(cb+1, 10);
    p.onNet=true;
    return;
  }
  // Tegen de zijkant lopen
  if(p.y+R > netTop+14){
    if(p.vx<0 && p.x-R<NX+NET_W() && p.x>NX){ p.x = NX+NET_W()+R; p.vx=Math.abs(p.vx)*.2; }
    if(p.vx>0 && p.x+R>NX-NET_W() && p.x<NX){ p.x = NX-NET_W()-R; p.vx=-Math.abs(p.vx)*.2; }
  }
  if(Math.abs(p.x-NX)>PR()*1.3){ if(p.onNet) nb.v=0; p.onNet=false; }
}

function resolvePlayerPlayer(){
  const R=PR();
  const dx=p2.x-p1.x, dy=p2.y-p1.y, d=Math.sqrt(dx*dx+dy*dy);
  if(d>=R*2 || d<.01) return;
  const nx=dx/d, ny=dy/d;
  const ov=(R*2-d)*.55;
  p1.x-=nx*ov*.5; p1.y-=ny*ov*.5;
  p2.x+=nx*ov*.5; p2.y+=ny*ov*.5;
  const dot=(p1.vx-p2.vx)*nx+(p1.vy-p2.vy)*ny;
  if(dot<=0) return;
  const pushF=0.85;
  const def1=p1.stats?.defense||1, def2=p2.stats?.defense||1;
  let imp1=dot*pushF/def1, imp2=dot*pushF/def2;
  p1.vx-=imp1*nx; p1.vy-=imp1*ny;
  p2.vx+=imp2*nx; p2.vy+=imp2*ny;
  // Body slam — aanval boost van de slammer, defense van het slachtoffer
  const p1fromAbove=ny<-0.5 && p1.vy>0 && !p1.grounded;
  const p2fromAbove=ny>0.5 && p2.vy>0 && !p2.grounded;
  if(p1fromAbove){
    const atk=p1.stats?.attack||1;
    p2.vx+=nx*SPD()*3.5*atk/def2; p2.vy=-G_PLR*6*atk/def2; p1.vy=-G_PLR*3;
  } else if(p2fromAbove){
    const atk=p2.stats?.attack||1;
    p1.vx-=nx*SPD()*3.5*atk/def1; p1.vy=-G_PLR*6*atk/def1; p2.vy=-G_PLR*3;
  }
}

function ballNet(){
  const NX=NET_X(), netTop=NET_TOP(), R=BR();
  if(ball.y+R > netTop && ball.x > NX-NET_W()-R && ball.x < NX+NET_W()+R){
    if(ball.vx<0 && ball.x>=NX){ ball.x = NX+NET_W()+R; ball.vx=Math.abs(ball.vx)*.6; ball.vy*=.55; }
    else if(ball.vx>0 && ball.x<=NX){ ball.x = NX-NET_W()-R; ball.vx=-Math.abs(ball.vx)*.6; ball.vy*=.55; }
  }
}

function hitBall(p){
  const R=PR(), BRv=BR();
  const dx=ball.x-p.x, dy=ball.y-p.y, d=Math.sqrt(dx*dx+dy*dy);
  if(d>=R+BRv || d<.01) return;
  const nx=dx/d, ny=dy/d;
  ball.x+=nx*(R+BRv-d); ball.y+=ny*(R+BRv-d);
  const dot=(ball.vx-p.vx)*nx+(ball.vy-p.vy)*ny;
  if(dot>=0) return;
  const isTop = ny < -0.3;
  const boost = (serveMode ? 1.5 : isTop ? 1.85 : 1.70) * (p.stats?.attack||1);
  ball.vx -= boost*dot*nx;
  ball.vy -= boost*dot*ny;
  if(isTop && !serveMode) ball.vy = Math.min(ball.vy, -7.5);
  ball.vx += p.vx*0.5;

  if(serveMode){
    const NX=NET_X(), netTop=NET_TOP();
    if(p.side===0){
      if(ball.vx < 2.5) ball.vx = 4.8;
    } else {
      if(ball.vx > -2.5) ball.vx = -4.8;
    }
    const distToNet = Math.abs(ball.x - NX);
    const timeToNet = distToNet/Math.max(Math.abs(ball.vx), .5);
    // Zorg dat bal duidelijk over het net gaat
    const reqVy = -((p.y-netTop) + 40)/Math.max(timeToNet,1) - 2;
    if(ball.vy > reqVy) ball.vy = reqVy;
    serveMode=false;
  }
  // Snelheidscap
  const spd=Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy), mx=9.0;
  if(spd>mx){ ball.vx*=mx/spd; ball.vy*=mx/spd; }
  ball.spin = ball.vx * 0.05;
}

// ════════════════════════════════════════════
//  UPDATE
// ════════════════════════════════════════════
function updatePlayer(p, nb, goL, goR, goJ, jLockGet, jLockSet){
  const GY=GND(), R=PR();
  const maxSpd = SPD()*(p.grounded?1.0:AIR_CTRL())*(p.stats?.speed||1);
  const accel = p.grounded ? 1.0 : 0.35;
  if(goL()){
    p.vx += (-maxSpd - p.vx)*accel;
    p.facing = -1;
  } else if(goR()){
    p.vx += (maxSpd - p.vx)*accel;
    p.facing = 1;
  } else {
    p.vx *= p.grounded ? .72 : .96;
  }
  if(goJ() && p.grounded && !jLockGet() && !p.onNet){
    p.vy = -Math.sqrt(2*G_PLR*MAX_JUMP()*(p.stats?.jump||1));
    p.grounded=false;
    jLockSet(true);
  }
  if(!goJ()) jLockSet(false);
  p.vy += G_PLR;
  p.x += p.vx; p.y += p.vy;
  if(p.y-R<2){ p.y=R+2; p.vy=Math.max(0,p.vy); }
  if(p.y>=GY-R){ p.y=GY-R; p.vy=0; p.grounded=true; p.onNet=false; }
  p.x = Math.max(R, Math.min(VW-R, p.x));
  playerNet(p, nb);
  // Bob animatie als hij loopt
  if(p.grounded && Math.abs(p.vx)>0.5) p.bobT += 0.25;
  else p.bobT *= 0.95;
}

function update(){
  if(over || !running) return;
  const GY=GND(), R=PR();

  updateCPU();

  updatePlayer(p1, p1NB, p1L, p1R, p1J, ()=>jLock1, v=>jLock1=v);
  updatePlayer(p2, p2NB, cpuL, cpuR, cpuJ, ()=>jLock2, v=>jLock2=v);

  resolvePlayerPlayer();
  if(p1.y>=GY-R){ p1.y=GY-R; p1.vy=0; p1.grounded=true; }
  if(p2.y>=GY-R){ p2.y=GY-R; p2.vy=0; p2.grounded=true; }
  p1.x = Math.max(R, Math.min(VW-R, p1.x));
  p2.x = Math.max(R, Math.min(VW-R, p2.x));

  if(!dead){
    ball.vy += G_BALL;
    ball.vx *= .995;
    ball.x += ball.vx; ball.y += ball.vy;
    ball.spin += ball.vx * 0.01;
    const BRv=BR();
    if(ball.x-BRv<0){ ball.x=BRv; ball.vx=Math.abs(ball.vx)*.70; }
    if(ball.x+BRv>VW){ ball.x=VW-BRv; ball.vx=-Math.abs(ball.vx)*.70; }
    if(ball.y-BRv<0){ ball.y=BRv; ball.vy=Math.abs(ball.vy)*.7; }
    ballNet();
    hitBall(p1);
    hitBall(p2);

    if(ball.y+BRv >= GY){
      dead=true; deadT=80;
      const w = ball.x < NET_X() ? 1 : 0;
      score[w]++;
      updateScore();
      if(score[w] >= WIN_POINTS){
        over=true;
        setTimeout(showWinMenu, 700);
      } else {
        srv = 1-w;
      }
    }
  } else {
    deadT--;
    if(deadT<=0 && !over){
      dead=false;
      resetPositions();
      ball = mkBall(srv);
      p1NB.v=0; p2NB.v=0;
    }
  }
}

// ════════════════════════════════════════════
//  DRAW
// ════════════════════════════════════════════
function w(v){ return v*SCALE; }

// Sumo tekenen
function drawSumo(p, mainColor, accentColor){
  const sx = w(p.x), sy = w(p.y);
  const r = w(PR());
  const bob = Math.sin(p.bobT)*w(2);

  ctx.save();
  ctx.translate(sx, sy + bob);

  // Schaduw onder
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(0, w(PR())*0.95 - bob, r*0.95, r*0.22, 0, 0, Math.PI*2);
  ctx.fill();

  // Mawashi (sumo gordel) — dunne band onderaan
  // Lichaam (rond, sumo stijl)
  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r*1.1);
  grad.addColorStop(0, lighten(mainColor, 30));
  grad.addColorStop(0.6, mainColor);
  grad.addColorStop(1, darken(mainColor, 25));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fill();

  // Mawashi band
  ctx.fillStyle = accentColor;
  ctx.beginPath();
  ctx.ellipse(0, r*0.45, r*0.95, r*0.22, 0, 0, Math.PI*2);
  ctx.fill();
  // Mawashi knoop voor
  ctx.fillStyle = darken(accentColor, 15);
  ctx.fillRect(-r*0.12, r*0.30, r*0.24, r*0.32);

  // Gezicht — een lichte ovaal bovenin
  const fx = w(8) * p.facing;
  ctx.fillStyle = '#f5d6a5';
  ctx.beginPath();
  ctx.arc(fx, -r*0.45, r*0.36, 0, Math.PI*2);
  ctx.fill();

  // Topknoot (chonmage)
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(fx, -r*0.72, r*0.18, 0, Math.PI*2);
  ctx.fill();
  ctx.fillRect(fx - r*0.06, -r*0.85, r*0.12, r*0.25);

  // Ogen
  ctx.fillStyle = '#1a1a1a';
  const eyeY = -r*0.48;
  const eyeOff = r*0.12;
  ctx.beginPath();
  ctx.arc(fx - eyeOff*p.facing + p.facing*r*0.05, eyeY, r*0.05, 0, Math.PI*2);
  ctx.arc(fx + eyeOff*p.facing + p.facing*r*0.05, eyeY, r*0.05, 0, Math.PI*2);
  ctx.fill();

  // Mond
  ctx.strokeStyle = '#5a2a00';
  ctx.lineWidth = w(2);
  ctx.beginPath();
  ctx.arc(fx + p.facing*r*0.05, -r*0.32, r*0.08, 0.1, Math.PI-0.1);
  ctx.stroke();

  // Armpjes aan de zijkant (klein, sumo stijl)
  ctx.fillStyle = lighten(mainColor, 5);
  ctx.beginPath();
  ctx.ellipse(-r*0.85, r*0.05, r*0.22, r*0.32, -0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(r*0.85, r*0.05, r*0.22, r*0.32, 0.3, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function lighten(hex, amt){
  const c=parseInt(hex.slice(1),16);
  let r=(c>>16)+amt, g=((c>>8)&0xff)+amt, b=(c&0xff)+amt;
  r=Math.min(255,Math.max(0,r)); g=Math.min(255,Math.max(0,g)); b=Math.min(255,Math.max(0,b));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}
function darken(hex, amt){ return lighten(hex, -amt); }

function drawSumoImg(p, canvas, ready, fixedFacing) {
  const sx = w(p.x), sy = w(p.y);
  const r = w(PR());
  const bob = Math.sin(p.bobT) * w(2);
  const groundY = w(GND());

  // Hoogte boven de grond (wereld-units). 0 = op de grond, groter = hoger gesprongen.
  const jumpH = Math.max(0, (GND() - PR()) - p.y);
  // Schaal: 1.0 op de grond → ~0.2 bij hoge sprong. Eerste 300 units verschuift snel, dan vlakt af.
  const shadowScale = Math.max(0.2, 1 - jumpH / 380);
  const shadowAlpha = 0.30 * shadowScale;

  // Schaduw — los van de speler, altijd op de grondlijn
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,' + shadowAlpha.toFixed(3) + ')';
  ctx.beginPath();
  ctx.ellipse(sx, groundY, r * 0.95 * shadowScale, r * 0.22 * shadowScale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Sumo zelf
  ctx.save();
  ctx.translate(sx, sy + bob);
  if (ready) {
    const facing = fixedFacing !== undefined ? fixedFacing : p.facing;
    if (facing < 0) ctx.scale(-1, 1);
    const imgW = r * 2.4;
    const imgH = r * 2.6;
    ctx.drawImage(canvas, -imgW / 2, r * 1.3 - imgH, imgW, imgH);
  }
  ctx.restore();
}

function drawBall(){
  if(dead) return;
  const bx = w(ball.x), by = w(ball.y), r = w(BR());
  // Schaduw op grond
  const gy = w(GND());
  const shadowScale = Math.max(0.2, 1 - (gy-by)/w(400));
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(bx, gy-w(2), r*shadowScale, r*0.3*shadowScale, 0, 0, Math.PI*2);
  ctx.fill();

  // Bal — volleybal stijl
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(ball.spin);

  const bgrad = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
  bgrad.addColorStop(0, '#ffffff');
  bgrad.addColorStop(0.7, '#fff5d4');
  bgrad.addColorStop(1, '#d4a574');
  ctx.fillStyle = bgrad;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fill();

  // Volleybal lijnen
  ctx.strokeStyle = '#1565c0';
  ctx.lineWidth = w(1.6);
  ctx.beginPath();
  ctx.arc(0, 0, r*0.95, 0, Math.PI*2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-r*0.9, 0); ctx.bezierCurveTo(-r*0.3, -r*0.6, r*0.3, -r*0.6, r*0.9, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-r*0.9, 0); ctx.bezierCurveTo(-r*0.3, r*0.6, r*0.3, r*0.6, r*0.9, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -r*0.95); ctx.lineTo(0, r*0.95);
  ctx.stroke();

  ctx.restore();
}

function drawDebugZones(){
  // (optioneel) — uit gelaten in productie
}

function draw(){
  ctx.clearRect(0, 0, CW, CH);

  // Achtergrond
  if(bgReady){
    ctx.drawImage(bgImg, 0, 0, CW, CH);
  } else {
    // Fallback: simpele sky + zand
    const sky = ctx.createLinearGradient(0, 0, 0, w(GND()));
    sky.addColorStop(0, '#1e6fc6');
    sky.addColorStop(1, '#6bb6e8');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, CW, w(GND()));
    ctx.fillStyle = '#e8b66a';
    ctx.fillRect(0, w(GND()), CW, CH-w(GND()));
  }

  // Sumo's
  drawSumoImg(p1, sumoCanvases.p1, sumosReady.p1, -1);  // p1 naar rechts (gespiegeld)
  drawSumoImg(p2, sumoCanvases.p2, sumosReady.p2,  1);  // p2 naar links (gespiegeld)

  // Bal
  drawBall();

  // Punt-vertraging flash (klein)
  if(dead){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, CW, CH);
    // Toon wie scoorde
    const winnerSide = ball.x < NET_X() ? 'CPU' : 'JIJ';
    const winColor = ball.x < NET_X() ? '#ff6b6b' : '#ffd84d';
    ctx.fillStyle = winColor;
    ctx.font = `900 ${w(38)}px -apple-system, sans-serif`;
    ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.6)';
    ctx.shadowBlur=w(8);
    ctx.shadowOffsetY=w(3);
    ctx.fillText(winnerSide+' SCOORT!', CW/2, CH/2);
    ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  }
}

playBtn.addEventListener('click', ()=>{

    showKeuzescherm();
  } else {
    menu.classList.remove('show');
    init();
    srv = 0;
    ball = mkBall(srv);
    running = true;
  }
});


// ════════════════════════════════════════════
//  KEUZESCHERM
// ════════════════════════════════════════════
const keuzescherm = document.getElementById('keuzescherm');
const kiesBtn = document.getElementById('kiesBtn');
const keuzeCarousel = document.getElementById('keuze-carousel');
const keuzeDots = document.querySelectorAll('.keuze-dot');
const chars = ['rood','geel','turquoise','paars'];
let keuzeIndex = 0;

function updateCarousel(animate){
  if(!animate){
    keuzeCarousel.style.transition = 'none';
    void keuzeCarousel.offsetWidth;
  }
  keuzeCarousel.style.transform = 'translateX(-' + keuzeIndex * 100 + '%)';
  if(!animate) keuzeCarousel.style.transition = '';
  keuzeDots.forEach((d,i) => d.classList.toggle('actief', i === keuzeIndex));
  selectedChar = chars[keuzeIndex];
}

let touchStartX = 0, touchStartY = 0, touchMoved = false;
keuzeCarousel.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, {passive:true});
keuzeCarousel.addEventListener('touchmove', e => { touchMoved = true; }, {passive:true});
keuzeCarousel.addEventListener('touchend', e => {
  if(!touchMoved) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40){
    if(dx < 0 && keuzeIndex < chars.length-1) keuzeIndex++;
    else if(dx > 0 && keuzeIndex > 0) keuzeIndex--;
    updateCarousel(true);
  }
}, {passive:true});

let mouseStartX = 0, mouseIsDown = false;
keuzeCarousel.addEventListener('mousedown', e => { mouseStartX = e.clientX; mouseIsDown = true; });
window.addEventListener('mouseup', e => {
  if(!mouseIsDown) return;
  mouseIsDown = false;
  const dx = e.clientX - mouseStartX;
  if(Math.abs(dx) > 40){
    if(dx < 0 && keuzeIndex < chars.length-1) keuzeIndex++;
    else if(dx > 0 && keuzeIndex > 0) keuzeIndex--;
    updateCarousel(true);
  }
});

function showKeuzescherm(){
  menu.classList.remove('show');
  keuzescherm.classList.add('show');
  running = false;
  updateCarousel(false);
}

kiesBtn.addEventListener('click', () => {
  keuzescherm.classList.remove('show');
  loadSumos(selectedChar);
  showStartMenu();
});

showKeuzescherm();

// ════════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════════
// init voor draw fallback
p1 = mkPlayer(0); p2 = mkPlayer(1); ball = mkBall(0);

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ════════════════════════════════════════════
//  PWA — service worker + update-melding
// ════════════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // Bij elke pagina-load checken op een nieuwe versie
      reg.update();
      reg.addEventListener('updatefound', ()=>{
        const sw = reg.installing;
        if(!sw) return;
        sw.addEventListener('statechange', ()=>{
          // Nieuwe versie klaar én er draait al een oude -> melding tonen
          if(sw.state==='installed' && navigator.serviceWorker.controller){
            showUpdateToast();
          }
        });
      });
    }).catch(()=>{});
  });
}

function showUpdateToast(){
  if(document.getElementById('updToast')) return;
  const t=document.createElement('div');
  t.id='updToast';
  t.textContent='✨ Nieuwe versie — tik om te laden';
  t.style.cssText='position:fixed;left:50%;bottom:max(env(safe-area-inset-bottom),16px);'
    +'transform:translateX(-50%);background:#0a4a78;color:#fff;padding:12px 20px;'
    +'border-radius:16px;font-weight:700;font-size:0.95rem;z-index:9999;'
    +'box-shadow:0 4px 16px rgba(0,0,0,.4);cursor:pointer;';
  t.onclick=()=>location.reload();
  document.body.appendChild(t);
}
</script>
